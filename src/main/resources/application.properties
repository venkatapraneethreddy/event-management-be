# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
server.port=${PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
# ── JWT ───────────────────────────────────────────────────────────────────────
# Dev fallback provided so the app runs locally without env vars.
# In production, ALWAYS set JWT_SECRET as an environment variable.
# The secret must be at least 32 characters for HMAC-SHA256.
jwt.secret=${JWT_SECRET:devLocalSecretKeyForDevelopmentOnly1234567890}
jwt.expiration.ms=3600000

# ── CORS (set CORS_ORIGIN env var in production) ─────────────────────────────
cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}

# ── Actuator (only health endpoint exposed) ───────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
# For Gmail: enable 2FA, generate an App Password at https://myaccount.google.com/apppasswords
# Then set env vars: MAIL_USERNAME=you@gmail.com  MAIL_PASSWORD=your-16-char-app-password
# Leave MAIL_USERNAME blank (default) to disable emails — app starts fine without it.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_USERNAME:noreply@eventclub.com}
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ── File Upload (event images) ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${UPLOAD_DIR:uploads}